[build-system]
requires = ["uv_build>=0.9.6,<0.10.0"]
build-backend = "uv_build"

[project]
name = "pipeline"
version = "0.0.1"
requires-python = ">=3.12,<3.13"
dependencies = [
    "common @ file://${PROJECT_ROOT}/../common",
    "psycopg[binary]>=3.2.0",
]

[project.scripts]
gismo-apply-metadata = "pipeline.metadata:main"
gismo-sync-lakebase = "pipeline.lakebase_sync:main"

[tool.uv.sources.common]
workspace = true
